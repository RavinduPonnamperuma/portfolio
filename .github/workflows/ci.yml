# CI for the dev → main promotion flow:
#   feature/* → PR to dev  → build → test → merge to dev
#   dev       → PR to main → build → test → merge to main
#
# Configure branch protection on GitHub so both jobs are required:
#   Settings → Branches → Add rule for `dev` and `main`
#   ✓ Require status checks: Build, Test

name: CI

on:
  pull_request:
    branches:
      - dev
      - main
      - release
  push:
    branches:
      - dev
      - main
      - release

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Next.js may inline NEXT_PUBLIC_* at build time; add secrets/vars in repo settings if needed
          NEXT_TELEMETRY_DISABLED: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & typecheck
        run: npm run test
